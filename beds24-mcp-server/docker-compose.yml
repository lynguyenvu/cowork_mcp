version: '3.8'

services:
  beds24-mcp:
    build: .
    container_name: beds24-mcp-server
    ports:
      - "8001:8001"
    environment:
      - BEDS24_API_TOKEN=${BEDS24_API_TOKEN}
      - BEDS24_REFRESH_TOKEN=${BEDS24_REFRESH_TOKEN}
      - BEDS24_API_BASE_URL=${BEDS24_API_BASE_URL:-https://api.beds24.com/v2}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

