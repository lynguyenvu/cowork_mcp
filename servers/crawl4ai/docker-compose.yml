version: '3.8'

services:
  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai-server
    ports:
      - "11235:11235"
    environment:
      # Optional: LLM API keys for AI-powered extraction
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Crawler config
      - MAX_CONCURRENT_TASKS=${CRAWL4AI_MAX_CONCURRENT:-5}
    volumes:
      - /dev/shm:/dev/shm  # Chromium shared memory performance boost
    mem_limit: 4g
    mem_reservation: 1g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - goclaw_default

  crawl4ai-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: crawl4ai-mcp-server
    ports:
      - "8100:8100"
    environment:
      - CRAWL4AI_BASE_URL=http://crawl4ai-server:11235
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8100
      - MCP_API_KEY=${MCP_API_KEY:-}  # Set to enable bearer token auth
    depends_on:
      crawl4ai:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "http://localhost:8100/mcp", "-H", "Content-Type: application/json", "-H", "Accept: application/json, text/event-stream", "-d", "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"health\",\"version\":\"1.0\"}}}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - goclaw_default

networks:
  goclaw_default:
    external: true
