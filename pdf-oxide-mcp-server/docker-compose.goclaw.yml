version: '3.8'

services:
  pdf-oxide-mcp:
    image: python:3.11-slim
    container_name: pdf-oxide-mcp
    working_dir: /app
    command: >
      bash -c "pip install --no-cache-dir pdf_oxide fastmcp pydantic uvicorn &&
      python server.py --transport streamable-http --port 8004"
    volumes:
      - /cowork_mcp/pdf-oxide-mcp-server:/app
    ports:
      - "8004:8004"
    networks:
      - pdf-oxide-mcp-net
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1

networks:
  pdf-oxide-mcp-net:
    name: pdf-oxide-mcp_openclaw-network
    driver: bridge